<html lang="en">
<head>

    <title>File Upload</title>
    <link rel="stylesheet" type="text/css" href="styles.css" >
</head>
<body>
    <form method="post" action="/uploads" enctype="multipart/form-data">

        <input style="font-style: italic; font-size: 1.1em;" id="file-input" type="file" name="uploadfile" multiple /> <br> <br>
        <input type="submit" id = "submit-button" value="Submit Upload">
    </form>
</body>
    <script src = "script.js" ></script>
</html>
